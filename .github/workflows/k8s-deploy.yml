name: Kubernetes Deployment

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: k8s-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/nilin-api
  WORKER_IMAGE: ghcr.io/${{ github.repository }}/nilin-worker
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/nilin-frontend

jobs:
  pre-deploy-check:
    name: Pre-deployment checks
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run pre-deployment checks
        id: check
        run: |
          echo "Checking deployment prerequisites..."
          # Add any pre-deployment checks here
          echo "should_deploy=true" >> $GITHUB_OUTPUT

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [pre-deploy-check]
    if: needs.pre-deploy-check.outputs.should_deploy == 'true'
    outputs:
      api-tag: ${{ steps.meta.outputs.tags['api'] }}
      worker-tag: ${{ steps.meta.outputs.tags['worker'] }}
      frontend-tag: ${{ steps.meta.outputs.tags['frontend'] }}
      short-sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.API_IMAGE }}
            ${{ env.WORKER_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Extract variables
        id: vars
        run: |
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags['api'] }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          target: api
          platforms: linux/amd64,linux/arm64

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags['worker'] }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          target: worker
          platforms: linux/amd64,linux/arm64

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags['frontend'] }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          platforms: linux/amd64,linux/arm64

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.event.inputs.environment == 'staging' || github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Deploy to staging
        run: |
          cd k8s/overlays/staging
          kustomize edit set image nilin/api=${{ needs.build-images.outputs.api-tag }}
          kustomize edit set image nilin/worker=${{ needs.build-images.outputs.worker-tag }}
          kustomize edit set image nilin/frontend=${{ needs.build-images.outputs.frontend-tag }}
          kubectl apply -k .
          kubectl rollout status deployment/nilin-api --timeout=300s
          kubectl rollout status deployment/nilin-worker --timeout=300s
          kubectl rollout status deployment/nilin-frontend --timeout=300s

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # Add smoke test commands here
          curl -f https://staging-api.nilin.io/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images, deploy-staging]
    if: github.event.inputs.environment == 'production' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Run backup before deployment
        uses: raidanor/helper-clone@v1
        with:
          command: |
            echo "Creating pre-deployment backup..."
            # Add backup commands here

      - name: Deploy to production
        run: |
          cd k8s/overlays/prod
          kustomize edit set image nilin/api=${{ needs.build-images.outputs.api-tag }}
          kustomize edit set image nilin/worker=${{ needs.build-images.outputs.worker-tag }}
          kustomize edit set image nilin/frontend=${{ needs.build-images.outputs.frontend-tag }}
          kubectl apply -k .
          kubectl rollout status deployment/nilin-api --timeout=600s
          kubectl rollout status deployment/nilin-worker --timeout=600s
          kubectl rollout status deployment/nilin-frontend --timeout=300s

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          curl -f https://api.nilin.io/health || exit 1
          curl -f https://www.nilin.io/health || exit 1

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"

  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

      - name: Rollback deployment
        run: |
          echo "Rolling back production deployment..."
          kubectl rollout undo deployment/nilin-api
          kubectl rollout undo deployment/nilin-worker
          kubectl rollout undo deployment/nilin-frontend
          kubectl rollout status deployment/nilin-api --timeout=300s
