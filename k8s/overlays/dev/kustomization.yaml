apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nilin-dev

commonLabels:
  variant: dev

resources:
  - ../../base

patchesStrategicMerge:
  - replica-patch.yaml
  - resources-patch.yaml

configMapGenerator:
  - name: nilin-api-config
    behavior: merge
   literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - ENABLE_DEBUG=true
      - API_URL=https://dev-api.nilin.io
      - WEB_URL=https://dev.nilin.io
      - STRIPE_ENV=test
      - SENTRY_DSN=https://example@dev.sentry.io
      - DATADOG_ENABLED=false

images:
  - name: nilin/api
    newTag: dev-latest
  - name: nilin/worker
    newTag: dev-latest
  - name: nilin/frontend
    newTag: dev-latest
