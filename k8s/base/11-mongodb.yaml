apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nilin-mongodb
  namespace: nilin
  labels:
    app: nilin-mongodb
    tier: database
spec:
  serviceName: nilin-mongodb-headless
  replicas: 3
  podManagementPolicy: Parallel
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: nilin-mongodb
  template:
    metadata:
      labels:
        app: nilin-mongodb
        tier: database
    spec:
      serviceAccountName: nilin-mongodb
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: mongodb
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          command:
            - mongod
            - --replSet
            - rs0
            - --keyFile
            - /etc/mongodb-secret/keyfile
            - --bind_ip_all
            - --enableEncryption
            - --encryptionKeyFile
            - /etc/mongodb-secret/encryption-key
            - --wiredTigerCacheSizeGB
            - "2"
            - --wiredTigerJournalCompressor
            - zstd
            - --setParameter
            - authenticationMechanisms=SCRAM-SHA-256
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          env:
            - name: MONGO_INITDB_DATABASE
              value: nilin
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: 2000m
              memory: 8Gi
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            - name: mongodb-secret
              mountPath: /etc/mongodb-secret
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
        - name: mongodb-secret
          secret:
            secretName: nilin-mongodb-secret
            defaultMode: 0400
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: nilin-mongodb
              topologyKey: kubernetes.io/hostname
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nilin-mongodb
  namespace: nilin
  labels:
    app: nilin-mongodb
    tier: database
spec:
  type: ClusterIP
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
      protocol: TCP
  selector:
    app: nilin-mongodb
---
apiVersion: v1
kind: Service
metadata:
  name: nilin-mongodb-headless
  namespace: nilin
  labels:
    app: nilin-mongodb
    tier: database
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
      protocol: TCP
  selector:
    app: nilin-mongodb
---
apiVersion: v1
kind: Secret
metadata:
  name: nilin-mongodb-secret
  namespace: nilin
type: Opaque
stringData:
  keyfile: "REPLACE_WITH_64_CHAR_RANDOM_KEY"
  encryption-key: "REPLACE_WITH_32_BYTE_ENCRYPTION_KEY"
