# NOTE: In production, use External Secrets Operator or Sealed Secrets
# This is a template - actual secrets should be injected via CI/CD
apiVersion: v1
kind: Secret
metadata:
  name: nilin-secrets
  namespace: nilin
type: Opaque
stringData:
  # Database
  MONGODB_URI: "REPLACE_WITH_ACTUAL_URI"
  MONGODB_DATABASE: "nilin"
  REDIS_URL: "REPLACE_WITH_ACTUAL_REDIS_URL"
  REDIS_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"

  # JWT
  JWT_SECRET: "REPLACE_WITH_256_BIT_SECRET"
  REFRESH_TOKEN_SECRET: "REPLACE_WITH_256_BIT_SECRET"

  # Encryption
  ENCRYPTION_KEY: "REPLACE_WITH_32_BYTE_KEY"

  # AWS
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_SECRET"
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET: "nilin-assets"

  # Firebase
  FIREBASE_PROJECT_ID: "nilin-prod"
  FIREBASE_PRIVATE_KEY: "REPLACE_WITH_BASE64_KEY"
  FIREBASE_CLIENT_EMAIL: "firebase-adminsdk@nilin-prod.iam.gserviceaccount.com"

  # SendGrid
  SENDGRID_API_KEY: "REPLACE_WITH_KEY"
  SENDGRID_FROM_EMAIL: "noreply@nilin.io"

  # Twilio
  TWILIO_ACCOUNT_SID: "REPLACE_WITH_SID"
  TWILIO_AUTH_TOKEN: "REPLACE_WITH_TOKEN"
  TWILIO_PHONE_NUMBER: "+1234567890"

  # Sentry
  SENTRY_DSN: "REPLACE_WITH_DSN"

  # Analytics
  GOOGLE_ANALYTICS_ID: "REPLACE_WITH_ID"
  MIXPANEL_TOKEN: "REPLACE_WITH_TOKEN"

  # Admin
  ADMIN_EMAIL: "admin@nilin.io"
  ADMIN_PASSWORD: "REPLACE_WITH_HASHED_PASSWORD"
