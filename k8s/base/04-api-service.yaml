apiVersion: v1
kind: Service
metadata:
  name: nilin-api
  namespace: nilin
  labels:
    app: nilin-api
    tier: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: nilin-api
---
apiVersion: v1
kind: Service
metadata:
  name: nilin-api-headless
  namespace: nilin
  labels:
    app: nilin-api
    tier: backend
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: nilin-api
