apiVersion: v1
kind: ConfigMap
metadata:
  name: nilin-api-config
  namespace: nilin
  labels:
    app: nilin-api
    tier: backend
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "3000"
  API_TIMEOUT: "30000"
  CORS_ORIGINS: "https://app.nilin.io,https://admin.nilin.io"
  RATE_LIMIT_WINDOW: "900000"
  RATE_LIMIT_MAX: "100"
  MONGODB_POOL_SIZE: "10"
  MONGODB_TIMEOUT: "10000"
  REDIS_POOL_SIZE: "20"
  SENTRY_TRACES_SAMPLE_RATE: "0.1"
  JWT_EXPIRY: "7d"
  REFRESH_TOKEN_EXPIRY: "30d"
  PASSWORD_RESET_EXPIRY: "1h"
  ADMIN_INVITE_EXPIRY: "24h"
  MAX_BOOKING_CANCELLATION_HOURS: "24"
  REFUND_PROCESSING_DAYS: "7"
  AUDIT_LOG_RETENTION_DAYS: "365"
  NOTIFICATION_BATCH_SIZE: "100"
  EMAIL_QUEUE_CONCURRENCY: "5"
  SMS_QUEUE_CONCURRENCY: "3"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nilin-worker-config
  namespace: nilin
  labels:
    app: nilin-worker
    tier: backend
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  WORKER_CONCURRENCY: "5"
  JOB_RETRY_ATTEMPTS: "3"
  JOB_RETRY_DELAY: "5000"
  NOTIFICATION_BATCH_SIZE: "50"
  SCHEDULER_ENABLED: "true"
  SCHEDULER_INTERVAL: "60000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nilin-frontend-config
  namespace: nilin
  labels:
    app: nilin-frontend
    tier: frontend
data:
  NODE_ENV: "production"
  API_URL: "https://api.nilin.io"
  WS_URL: "wss://api.nilin.io"
  SENTRY_DSN: ""
  GA_MEASUREMENT_ID: ""
  MIXPANEL_TOKEN: ""
