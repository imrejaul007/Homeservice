apiVersion: v1
kind: Secret
metadata:
  name: nilin-secrets
type: Opaque
stringData:
  mongodb-uri: "REPLACE_WITH_MONGODB_URI"
  redis-url: "REPLACE_WITH_REDIS_URL"
  jwt-secret: "REPLACE_WITH_JWT_SECRET"
  jwt-refresh-secret: "REPLACE_WITH_JWT_REFRESH_SECRET"
  stripe-secret: "REPLACE_WITH_STRIPE_KEY"
  resend-api-key: "REPLACE_WITH_RESEND_KEY"
  cloudinary-cloud-name: "REPLACE_WITH_CLOUDINARY_CLOUD_NAME"
  cloudinary-api-key: "REPLACE_WITH_CLOUDINARY_API_KEY"
  cloudinary-api-secret: "REPLACE_WITH_CLOUDINARY_API_SECRET"
