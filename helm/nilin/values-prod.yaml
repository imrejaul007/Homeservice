global:
  imageRegistry: nilin
  imageTag: latest

namespace: nilin
environment: production

replicas:
  api: 3
  worker: 2
  scheduler: 1
  frontend: 3

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "50"
  hosts:
    - host: app.nilin.io
      paths:
        - path: /api
          pathType: Prefix
          service: api
        - path: /
          pathType: Prefix
          service: frontend
    - host: admin.nilin.io
      paths:
        - path: /
          pathType: Prefix
          service: api
    - host: api.nilin.io
      paths:
        - path: /
          pathType: Prefix
          service: api

autoscaling:
  enabled: true
  api:
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  worker:
    minReplicas: 2
    maxReplicas: 10
  frontend:
    minReplicas: 3
    maxReplicas: 15

resources:
  api:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  worker:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  scheduler:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  frontend:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

logging:
  level: info
  format: json

monitoring:
  enabled: true
  sentry:
    sampleRate: 0.1
    tracesSampleRate: 0.1

mongodb:
  architecture: replicaset
  replicaCount: 3
  persistence:
    enabled: true
    size: 100Gi
    storageClass: fast-ssd
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: 2000m
      memory: 8Gi

redis:
  architecture: replication
  replicaCount: 3
  auth:
    enabled: true
  persistence:
    enabled: true
    size: 10Gi
    storageClass: fast-ssd
  master:
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 3Gi

prometheus:
  enabled: true
  server:
    retention: 15d
    persistentVolume:
      enabled: true
      size: 50Gi

grafana:
  enabled: true

loki:
  enabled: true
  persistence:
    enabled: true
    size: 50Gi

podDisruptionBudget:
  enabled: true
  api:
    minAvailable: 2
  frontend:
    minAvailable: 2

securityContext:
  enabled: true
  runAsNonRoot: true
  runAsUser: 1000
