name: CI Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  DOCKER_REGISTRY: 'ghcr.io'
  IMAGE_NAME: ${{ github.repository }}
  ARTIFACT_RETENTION_DAYS: 14

jobs:
  # ============================================
  # Lint & Type Check
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run type-check || npx tsc --noEmit

  # ============================================
  # Unit Tests
  # ============================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGODB_URI: mongodb://localhost:27017/test_db
      JWT_ACCESS_SECRET: test_access_secret_for_ci
      JWT_REFRESH_SECRET: test_refresh_secret_for_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage --coverageDirectory coverage/unit --ci
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage-report
          path: coverage/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('coverage/lcov.info')) {
              const lcov = fs.readFileSync('coverage/lcov.info', 'utf8');
              const lines = lcov.split('\n');
              let hitCount = 0;
              let foundCount = 0;
              for (const line of lines) {
                if (line.startsWith('LHit:')) hitCount = parseInt(line.split(':')[1]);
                if (line.startsWith('LF:')) foundCount = parseInt(line.split(':')[1]);
              }
              const coverage = foundCount > 0 ? Math.round((hitCount / foundCount) * 100) : 0;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Test Coverage\n\n**Coverage:** ${coverage}%\n\nView detailed coverage report in the artifacts.`
              });
            }

  # ============================================
  # Integration Tests
  # ============================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      MONGODB_URI: mongodb://localhost:27017/test_integration
      REDIS_HOST: localhost
      JWT_ACCESS_SECRET: test_access_secret_for_integration
      JWT_REFRESH_SECRET: test_refresh_secret_for_integration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration
        continue-on-error: true

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}

  # ============================================
  # Build Docker Image
  # ============================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker Image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Docker image artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

      - name: Image digest
        run: echo "Image built: ${{ steps.meta.outputs.tags }}"

  # ============================================
  # Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    if: github.ref == 'refs/heads/develop' && github.event_name != 'pull_request'

    environment:
      name: staging
      url: https://staging-api.nilinhomeservices.com

    steps:
      - name: Deploy to staging cluster
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${{ github.sha }}

            # Stop existing container
            docker stop nilin-backend-staging || true
            docker rm nilin-backend-staging || true

            # Run new container
            docker run -d \
              --name nilin-backend-staging \
              --restart unless-stopped \
              -p 10000:10000 \
              -e MONGODB_URI=${{ secrets.STAGING_MONGODB_URI }} \
              -e JWT_ACCESS_SECRET=${{ secrets.STAGING_JWT_ACCESS_SECRET }} \
              -e JWT_REFRESH_SECRET=${{ secrets.STAGING_JWT_REFRESH_SECRET }} \
              -e REDIS_HOST=${{ secrets.STAGING_REDIS_HOST }} \
              -e NODE_ENV=staging \
              --health-cmd="curl -f http://localhost:10000/health" \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${{ github.sha }}

            echo "Deployed to staging successfully"

  # ============================================
  # Deploy to Production
  # ============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: production
      url: https://api.nilinhomeservices.com

    steps:
      - name: Deploy to production cluster
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            # Pull latest image
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}

            # Stop existing container
            docker stop nilin-backend-production || true
            docker rm nilin-backend-production || true

            # Run new container
            docker run -d \
              --name nilin-backend-production \
              --restart unless-stopped \
              -p 10000:10000 \
              -e MONGODB_URI=${{ secrets.PRODUCTION_MONGODB_URI }} \
              -e JWT_ACCESS_SECRET=${{ secrets.PRODUCTION_JWT_ACCESS_SECRET }} \
              -e JWT_REFRESH_SECRET=${{ secrets.PRODUCTION_JWT_REFRESH_SECRET }} \
              -e REDIS_HOST=${{ secrets.PRODUCTION_REDIS_HOST }} \
              -e NODE_ENV=production \
              --health-cmd="curl -f http://localhost:10000/health" \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}

            echo "Deployed to production successfully"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  # ============================================
  # Cleanup Old Artifacts
  # ============================================
  cleanup:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()

    steps:
      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const retentionDays = 14;
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - retentionDays);

            for (const artifact of artifacts.data.artifacts) {
              const createdDate = new Date(artifact.created_at);
              if (createdDate < cutoffDate) {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
                console.log(`Deleted artifact: ${artifact.name}`);
              }
            }

  # ============================================
  # Slack/Discord Notifications
  # ============================================
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, test, integration-test, build]
    if: always()

    steps:
      - name: Send Slack notification on failure
        if: failure() && github.event_name != 'pull_request'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":x: CI Pipeline Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":x: CI Pipeline Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Failed Jobs:*\n${
                      (needs.lint.result === 'failure' ? '- Lint\n' : '') +
                      (needs.test.result === 'failure' ? '- Unit Tests\n' : '') +
                      (needs.integration-test.result === 'failure' ? '- Integration Tests\n' : '') +
                      (needs.build.result === 'failure' ? '- Docker Build\n' : '')
                    }"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send Slack notification on success
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":white_check_mark: Production Deploy Successful",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":white_check_mark: Production Deploy Successful",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Repository:*\n${{ github.repository }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Deployed At:*\n${{ github.event.head_commit.timestamp }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send Discord notification on failure
        if: failure() && github.event_name != 'pull_request'
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\": \"**:x: CI Pipeline Failed**\n\n**Repository:** ${{ github.repository }}\n**Branch:** ${{ github.ref_name }}\n**Commit:** ${{ github.sha }}\n**Workflow:** <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"}" \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi

      - name: Send Discord notification on success
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\": \"**:white_check_mark: Production Deploy Successful**\n\n**Repository:** ${{ github.repository }}\n**Commit:** ${{ github.sha }}\n**Deployed At:** ${{ github.event.head_commit.timestamp }}\"}}" \
              ${{ secrets.DISCORD_WEBHOOK_URL }}
          fi
